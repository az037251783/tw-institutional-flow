<script>
(function(){
  const fmt = n => (n<0?'-':'') + Math.abs(n).toLocaleString('en-US');
  const yh = s => 'https://tw.stock.yahoo.com/quote/'+s;

  if(!DATA.available){
    document.getElementById('hdrMeta').textContent = '尚無 ETF 持股資料';
    document.getElementById('chgArea').innerHTML = '<div class="notice">尚未抓到 ETF 持股，請先執行每日更新。</div>';
    return;
  }

  // 表頭資訊
  const etfList = DATA.etfs.map(e=>`${e.code} ${e.name}(${e.count})`).join('、');
  document.getElementById('hdrMeta').innerHTML =
    `資料截至 <b>${DATA.as_of}</b> · 已累積 <b>${DATA.n_days}</b> 日快照 · 更新 ${META.generatedAt}（台北）`;
  document.getElementById('holdSub').textContent = `追蹤市值前 ${DATA.etfs.length} 大 ETF：${etfList}`;
  document.getElementById('footDis').innerHTML =
    `<b>資料來源</b>：ETF 資訊網（etfinfo.tw）彙整各投信每日持股，依規模(AUM)取前 ${DATA.etfs.length} 大：${etfList}。單位「張」＝1000股；持股「進出」為跨這些 ETF 的持有股數變化。<br>`+
    `<b>說明</b>：免費資料僅提供「當前」持股、無歷史可回補，故進出變化自上線日起逐日累積（5日/20日需累積足夠交易日）。<br>`+
    `<b>免責</b>：本頁為資訊整理，非投資建議。`;

  // ---- 當前持股彙總（可依張數/依市值排序） ----
  const holdState = {unit:'lots'};
  const hVal  = r => holdState.unit==='val' ? r.value : r.lots;
  const hFmt  = v => holdState.unit==='val' ? Math.abs(v).toFixed(2)+' 億' : fmt(v);
  const hHead = () => holdState.unit==='val' ? '總市值(億)' : '總張數';
  const hAxis = () => holdState.unit==='val' ? '億元' : '張';
  function buildHoldings(){
    const wrap = document.getElementById('holdUnit');
    if (DATA.has_value){
      wrap.innerHTML = '<div class="tabs"><span class="lab">排序</span>'+
        ['lots','val'].map(u=>`<button class="pill${holdState.unit===u?' on':''}" data-hu="${u}">${u==='val'?'依市值':'依張數'}</button>`).join('')+'</div>';
      wrap.querySelectorAll('[data-hu]').forEach(b=>b.onclick=()=>{holdState.unit=b.dataset.hu; buildHoldings();});
    }
    const rows = DATA.holdings.slice().sort((a,b)=>hVal(b)-hVal(a)).slice(0, DATA.top).map((r,i)=>({...r,rank:i+1}));
    let h=`<thead><tr><th>#</th><th class="l">代號</th><th class="l">名稱</th><th>${hHead()}</th><th>持有ETF數</th><th class="l">持有的ETF</th></tr></thead><tbody>`;
    rows.forEach(r=>{
      h+=`<tr><td class="rank">${r.rank}</td>
        <td class="l"><a href="${yh(r.symbol)}" target="_blank" rel="noopener">${r.symbol}</a></td>
        <td class="l">${r.name}</td>
        <td class="num">${hFmt(hVal(r))}</td>
        <td>${r.n_etfs}</td>
        <td class="l" style="font-size:12px;color:#64748b">${r.etfs}</td></tr>`;
    });
    document.getElementById('holdTable').innerHTML = h+'</tbody>';
    const r2 = rows.slice(0,20).reverse();
    Plotly.newPlot('holdChart',[{type:'bar',orientation:'h',
      x:r2.map(x=>hVal(x)), y:r2.map(x=>x.name+' '+x.symbol),
      text:r2.map(x=>hFmt(hVal(x))), textposition:'auto', marker:{color:'#7c3aed'},
      hovertemplate:'%{y}<br>%{text}<extra></extra>'}],
      {margin:{l:130,r:16,t:6,b:28},height:340,xaxis:{title:hAxis(),gridcolor:'#eef2f7'},
       yaxis:{automargin:true,tickfont:{size:11}},paper_bgcolor:'rgba(0,0,0,0)',plot_bgcolor:'rgba(0,0,0,0)'},
      {responsive:true,displayModeBar:false});
  }

  // ---- 進出變化 ----
  const chgState = {p: (DATA.periods.find(p=>p.available) || DATA.periods[0] || {key:'d'}).key, unit:'lots'};
  const cVal  = r => chgState.unit==='val' ? r.val : r.lots;
  const cFmt  = v => chgState.unit==='val' ? (v<0?'-':'')+Math.abs(v).toFixed(2)+' 億' : fmt(v);
  const cHead = () => chgState.unit==='val' ? '金額(億)' : '張數變化';
  const cAxis = () => chgState.unit==='val' ? '億元' : '張';
  function buildChange(){
    const area = document.getElementById('chgArea');
    let tabs='<div class="tabs"><span class="lab">期間</span>';
    DATA.periods.forEach(p=>{
      tabs+=`<button class="pill${p.key===chgState.p?' on':''}${p.available?'':' dim'}" data-k="${p.key}">`+
            `${p.name}${p.available?'':' ·待累積'}</button>`;
    });
    tabs+='</div>';
    if (DATA.has_value){
      tabs+='<div class="tabs" style="margin-top:8px"><span class="lab">單位</span>'+
        ['lots','val'].map(u=>`<button class="pill${chgState.unit===u?' on':''}" data-u="${u}">${u==='val'?'金額':'張數'}</button>`).join('')+
        '</div>';
    }
    tabs+='<div id="chgBody"></div>';
    area.innerHTML = tabs;
    area.querySelectorAll('[data-k]').forEach(b=>b.onclick=()=>{chgState.p=b.dataset.k; buildChange();});
    area.querySelectorAll('[data-u]').forEach(b=>b.onclick=()=>{chgState.unit=b.dataset.u; buildChange();});
    renderChange();
  }
  function cTable(id,rows){
    let h=`<thead><tr><th>#</th><th class="l">代號</th><th class="l">名稱</th><th>${cHead()}</th></tr></thead><tbody>`;
    rows.forEach(r=>{ h+=`<tr><td class="rank">${r.rank}</td>
      <td class="l"><a href="${yh(r.symbol)}" target="_blank" rel="noopener">${r.symbol}</a></td>
      <td class="l">${r.name}</td><td class="num">${cFmt(cVal(r))}</td></tr>`;});
    document.getElementById(id).innerHTML=h+'</tbody>';
  }
  function cBar(id,rows,color){
    const r=rows.slice().reverse();
    Plotly.newPlot(id,[{type:'bar',orientation:'h',x:r.map(x=>Math.abs(cVal(x))),
      y:r.map(x=>x.name+' '+x.symbol),text:r.map(x=>cFmt(cVal(x))),textposition:'auto',
      marker:{color},hovertemplate:'%{y}<br>%{text}<extra></extra>'}],
      {margin:{l:130,r:16,t:6,b:28},height:340,xaxis:{title:cAxis(),gridcolor:'#eef2f7'},
       yaxis:{automargin:true,tickfont:{size:11}},paper_bgcolor:'rgba(0,0,0,0)',plot_bgcolor:'rgba(0,0,0,0)'},
      {responsive:true,displayModeBar:false});
  }
  function renderChange(){
    const p = DATA.periods.find(x=>x.key===chgState.p) || DATA.periods[0];
    const body = document.getElementById('chgBody');
    if(!p || !p.available){
      const need = (p?p.k:1)+1, have = DATA.n_days, remain = Math.max(0, need-have);
      body.innerHTML = `<div class="notice">「<b>${p?p.name:''}</b>」需累積 <b>${need}</b> 個交易日的快照才能計算`+
        `（最新 vs ${p?p.k:1} 日前）。目前已累積 <b>${have}</b> 天，還差 <b>${remain}</b> 天。<br>`+
        `免費資料無歷史可回補，每交易日 18:00 自動累積一天。</div>`;
      return;
    }
    const cc = DATA.changes[p.key];
    const node = (chgState.unit==='val' && cc.val) ? cc.val : cc.lots;
    body.innerHTML='<div class="panels">'+
      '<div class="panel add"><div class="head">🟢 ETF 加碼 Top'+DATA.top+'</div><div id="addChart" class="chart"></div><div class="tblwrap"><table id="addTable"></table></div></div>'+
      '<div class="panel reduce"><div class="head">🔴 ETF 減碼 Top'+DATA.top+'</div><div id="redChart" class="chart"></div><div class="tblwrap"><table id="redTable"></table></div></div>'+
      '</div>';
    cBar('addChart',node.add,'#16a34a'); cBar('redChart',node.reduce,'#dc2626');
    cTable('addTable',node.add); cTable('redTable',node.reduce);
  }

  buildHoldings(); buildChange();
})();
</script>
