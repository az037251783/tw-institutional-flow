<style>
  :root{

  main{max-width:1200px;margin:0 auto;padding:18px 16px 60px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:16px;margin-bottom:18px;box-shadow:0 1px 2px rgba(15,23,42,.04)}

  .tabs{display:flex;flex-wrap:wrap;gap:8px;margin:4px 0 0}
  .tabs.lbl{margin-top:14px}
  .tabs .lab{font-size:12px;color:var(--muted);align-self:center;margin-right:2px}
  .pill{border:1px solid var(--line);background:#fff;color:var(--ink);
    padding:7px 14px;border-radius:999px;font-size:14px;cursor:pointer;transition:.15s}
  .pill:hover{border-color:#94a3b8}
  .pill.on{background:#0f172a;color:#fff;border-color:#0f172a}
  .range{font-size:13px;color:var(--muted);margin:12px 2px 0}
  .panels{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:14px}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden}
  .panel .head{padding:12px 16px;font-weight:600;font-size:15px;display:flex;
    justify-content:space-between;align-items:center}
  .panel.buy .head{background:var(--buy-bg);color:var(--buy)}
  .panel.sell .head{background:var(--sell-bg);color:var(--sell)}
  .chart{width:100%;height:320px}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th,td{padding:8px 12px;text-align:right;border-top:1px solid var(--line);white-space:nowrap}
  th{background:#f8fafc;color:var(--muted);font-weight:600;cursor:pointer;user-select:none;position:sticky;top:0}
  th.l,td.l{text-align:left}
  td.rank{color:var(--muted);font-variant-numeric:tabular-nums}
  td.num{font-variant-numeric:tabular-nums;font-weight:600}
  .panel.buy td.num{color:var(--buy)} .panel.sell td.num{color:var(--sell)}
  td a{color:inherit;text-decoration:none;border-bottom:1px dashed #cbd5e1}
  td a:hover{border-bottom-style:solid}
  .badge{display:inline-block;font-size:11px;padding:1px 6px;border-radius:6px;
    background:#f1f5f9;color:var(--muted);margin-left:6px}
  .tblwrap{max-height:560px;overflow:auto}
  footer{max-width:1200px;margin:0 auto;padding:0 16px 50px;color:var(--muted);font-size:12px}
  footer .dis{background:#fff;border:1px solid var(--line);border-radius:10px;padding:12px 14px}
  @media (max-width:900px){
    .panels{grid-template-columns:1fr}
    header h1{font-size:19px}
    .chart{height:300px}
  }
</style>

<script>
(function(){
  const fmt = n => (n<0?'-':'') + Math.abs(n).toLocaleString('en-US');
  const C = {foreign:'#2563eb',trust:'#f59e0b',dealer:'#8b5cf6',buy:'#16a34a',sell:'#dc2626'};
  const state = {p: DATA.periods[0].key, inv: DATA.investors[0].key,
                 sort:{buy:{k:'rank',d:1}, sell:{k:'rank',d:1}}};

  // ---- 分頁按鈕 ----
  function buildTabs(){
    const pt = document.getElementById('periodTabs');
    DATA.periods.forEach(p=>{
      const b=document.createElement('button');
      b.className='pill'+(p.key===state.p?' on':''); b.textContent=p.name;
      b.onclick=()=>{state.p=p.key; refreshTabs(); render();};
      pt.appendChild(b);
    });
    const it = document.getElementById('investorTabs');
    DATA.investors.forEach(v=>{
      const b=document.createElement('button');
      b.className='pill'+(v.key===state.inv?' on':''); b.textContent=v.name;
      b.onclick=()=>{state.inv=v.key; refreshTabs(); render();};
      it.appendChild(b);
    });
    document.getElementById('topNa').textContent=DATA.top;
    document.getElementById('topNb').textContent=DATA.top;
  }
  function refreshTabs(){
    document.querySelectorAll('#periodTabs .pill').forEach((b,i)=>
      b.classList.toggle('on', DATA.periods[i].key===state.p));
    document.querySelectorAll('#investorTabs .pill').forEach((b,i)=>
      b.classList.toggle('on', DATA.investors[i].key===state.inv));
  }

  // ---- 表格 ----
  function sortRows(rows, side){
    const s=state.sort[side]; const r=rows.slice();
    r.sort((a,b)=>{
      let va=a[s.k], vb=b[s.k];
      if(s.k==='symbol'){va=a.symbol; vb=b.symbol; return (va<vb?-1:va>vb?1:0)*s.d;}
      if(s.k==='lots'){va=a.lots; vb=b.lots;}            // 已含正負
      return (va-vb)*s.d;
    });
    return r;
  }
  function buildTable(id, rows, side){
    const t=document.getElementById(id);
    const cols=[['rank','#','rank'],['symbol','代號','l'],['name','名稱','l'],['lots','張數','num']];
    let h='<thead><tr>';
    cols.forEach(c=>{ const cur=state.sort[side].k===c[0];
      h+=`<th class="${c[2]==='l'?'l':''}" data-k="${c[0]}">${c[1]}${cur?(state.sort[side].d>0?' ▲':' ▼'):''}</th>`;});
    h+='</tr></thead><tbody>';
    sortRows(rows, side).forEach(r=>{
      const yh='https://tw.stock.yahoo.com/quote/'+r.symbol;
      h+=`<tr>
        <td class="rank">${r.rank}</td>
        <td class="l"><a href="${yh}" target="_blank" rel="noopener">${r.symbol}</a></td>
        <td class="l">${r.name}<span class="badge">${r.market}</span></td>
        <td class="num">${fmt(r.lots)}</td></tr>`;
    });
    h+='</tbody>'; t.innerHTML=h;
    t.querySelectorAll('th').forEach(th=>th.onclick=()=>{
      const k=th.dataset.k, s=state.sort[side];
      if(s.k===k) s.d=-s.d; else {s.k=k; s.d=(k==='lots'?-1:1);}
      buildTable(id, rows, side);
    });
  }

  // ---- 長條圖 ----
  function buildBar(id, rows, side){
    const r=rows.slice().reverse();             // 讓第1名在最上方
    const color = side==='buy'?C.buy:C.sell;
    const y=r.map(x=>x.name+' '+x.symbol);
    const x=r.map(x=>Math.abs(x.lots));
    const text=r.map(x=>fmt(x.lots));
    Plotly.newPlot(id, [{
      type:'bar', orientation:'h', x, y, text, textposition:'auto',
      marker:{color}, hovertemplate:'%{y}<br>%{text} 張<extra></extra>'
    }], {
      margin:{l:120,r:16,t:6,b:28}, height:320,
      xaxis:{title:'張', zeroline:false, gridcolor:'#eef2f7'},
      yaxis:{automargin:true, tickfont:{size:11}},
      paper_bgcolor:'rgba(0,0,0,0)', plot_bgcolor:'rgba(0,0,0,0)'
    }, {responsive:true, displayModeBar:false});
  }

  // ---- 總覽走勢 ----
  function buildOverview(){
    const ts=DATA.market_ts; if(!ts.dates.length) return;
    const mk=(k,name)=>({type:'scatter',mode:'lines',name,x:ts.dates,y:ts[k],
      line:{color:C[k],width:2}});
    Plotly.newPlot('overviewChart',
      [mk('foreign','外資'),mk('trust','投信'),mk('dealer','自營商')],
      {margin:{l:50,r:16,t:6,b:34},height:300,hovermode:'x unified',
       legend:{orientation:'h',y:1.15},
       yaxis:{title:'張',gridcolor:'#eef2f7',zeroline:true,zerolinecolor:'#cbd5e1'},
       xaxis:{gridcolor:'#f1f5f9'},
       paper_bgcolor:'rgba(0,0,0,0)',plot_bgcolor:'rgba(0,0,0,0)'},
      {responsive:true, displayModeBar:false});
  }

  // ---- 主渲染 ----
  function render(){
    const pmeta=DATA.periods.find(p=>p.key===state.p);
    const vname=DATA.investors.find(v=>v.key===state.inv).name;
    document.getElementById('rangeLabel').textContent=
      `期間：${pmeta.name}（${pmeta.range}）｜法人：${vname}`;
    const node=DATA.lists[state.p][state.inv];
    document.getElementById('buySub').textContent=vname+'·'+pmeta.name;
    document.getElementById('sellSub').textContent=vname+'·'+pmeta.name;
    buildBar('buyChart', node.buy, 'buy');
    buildBar('sellChart', node.sell, 'sell');
    buildTable('buyTable', node.buy, 'buy');
    buildTable('sellTable', node.sell, 'sell');
  }

  buildTabs(); buildOverview(); render();
})();
</script>
