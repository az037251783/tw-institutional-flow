<meta charset="utf-8">

<title>ETF 持股進出彙總</title>

<style>
  :root{--bg:#f1f5f9;--card:#fff;--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;
    --buy:#16a34a;--buy-bg:#dcfce7;--sell:#dc2626;--sell-bg:#fee2e2;--brand:#7c3aed;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,"Segoe UI",Roboto,"Noto Sans TC","Microsoft JhengHei",sans-serif;line-height:1.5}
  header{background:linear-gradient(135deg,#3b0764,#1e293b);color:#fff;padding:22px 20px}
  header .wrap{max-width:1200px;margin:0 auto}
  header h1{margin:0;font-size:22px}
  header .meta{margin-top:6px;font-size:13px;color:#d8b4fe}
  header .meta b{color:#fff}
  .navlink{display:inline-block;margin-top:10px;color:#e9d5ff;font-size:13px;text-decoration:none;
    border:1px solid #6d28d9;border-radius:999px;padding:5px 12px}
  .navlink:hover{background:#6d28d9}
  main{max-width:1200px;margin:0 auto;padding:18px 16px 60px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:18px}
  .card h2{margin:0 0 4px;font-size:16px}
  .card .sub{color:var(--muted);font-size:13px;margin-bottom:10px}
  .notice{background:#fffbeb;border:1px solid #fde68a;color:#92400e;border-radius:12px;padding:14px 16px;font-size:14px}
  .tabs{display:flex;flex-wrap:wrap;gap:8px;margin:4px 0 0}
  .tabs .lab{font-size:12px;color:var(--muted);align-self:center}
  .pill{border:1px solid var(--line);background:#fff;padding:7px 14px;border-radius:999px;font-size:14px;cursor:pointer}
  .pill.on{background:#0f172a;color:#fff;border-color:#0f172a}
  .pill.dim{opacity:.5}
  .etfsel{padding:8px 12px;border:1px solid var(--line);border-radius:8px;font-size:14px;
    max-width:100%;background:#fff;color:var(--ink);cursor:pointer}
  .chart{width:100%;height:340px}
  .panels{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:14px}
  .panel{border:1px solid var(--line);border-radius:14px;overflow:hidden}
  .panel .head{padding:12px 16px;font-weight:600}
  .panel.add .head{background:var(--buy-bg);color:var(--buy)}
  .panel.reduce .head{background:var(--sell-bg);color:var(--sell)}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th,td{padding:8px 12px;text-align:right;border-top:1px solid var(--line);white-space:nowrap}
  th{background:#f8fafc;color:var(--muted);font-weight:600;cursor:pointer;position:sticky;top:0}
  th.l,td.l{text-align:left}
  td.rank{color:var(--muted)} td.num{font-variant-numeric:tabular-nums;font-weight:600}
  .panel.add td.num{color:var(--buy)} .panel.reduce td.num{color:var(--sell)}
  td a{color:inherit;text-decoration:none;border-bottom:1px dashed #cbd5e1}
  .badge{display:inline-block;font-size:11px;padding:1px 6px;border-radius:6px;background:#ede9fe;color:#6d28d9;margin-left:6px}
  .tblwrap{max-height:620px;overflow:auto}
  footer{max-width:1200px;margin:0 auto;padding:0 16px 50px;color:var(--muted);font-size:12px}
  footer .dis{background:#fff;border:1px solid var(--line);border-radius:10px;padding:12px 14px}
  @media (max-width:900px){.panels{grid-template-columns:1fr}}
</style>

</head>

<script>

  // ---- 當前持股彙總（可依張數/依市值排序） ----
  const holdState = {unit:'lots'};
  const hVal  = r => holdState.unit==='val' ? r.value : r.lots;
  const hFmt  = v => holdState.unit==='val' ? Math.abs(v).toFixed(2)+' 億' : fmt(v);
  const hHead = () => holdState.unit==='val' ? '總市值(億)' : '總張數';
  const hAxis = () => holdState.unit==='val' ? '億元' : '張';
  function buildHoldings(){
    const wrap = document.getElementById('holdUnit');
    if (DATA.has_value){
      wrap.innerHTML = '<div class="tabs"><span class="lab">排序</span>'+

      wrap.querySelectorAll('[data-hu]').forEach(b=>b.onclick=()=>{holdState.unit=b.dataset.hu; buildHoldings();});
    }
    const rows = DATA.holdings.slice().sort((a,b)=>hVal(b)-hVal(a)).slice(0, DATA.top).map((r,i)=>({...r,rank:i+1}));
    let h=`<thead><tr><th>#</th><th class="l">代號</th><th class="l">名稱</th><th>${hHead()}</th><th>持有ETF數</th><th class="l">持有的ETF</th></tr></thead><tbody>`;
    rows.forEach(r=>{
      h+=`<tr><td class="rank">${r.rank}</td>
        <td class="l"><a href="${yh(r.symbol)}" target="_blank" rel="noopener">${r.symbol}</a></td>
        <td class="l">${r.name}</td>
        <td class="num">${hFmt(hVal(r))}</td>
        <td>${r.n_etfs}</td>
        <td class="l" style="font-size:12px;color:#64748b">${r.etfs}</td></tr>`;
    });
    document.getElementById('holdTable').innerHTML = h+'</tbody>';
    const r2 = rows.slice(0,20).reverse();

       yaxis:{automargin:true,tickfont:{size:11}},paper_bgcolor:'rgba(0,0,0,0)',plot_bgcolor:'rgba(0,0,0,0)'},
      {responsive:true,displayModeBar:false});
  }

  // ---- 進出變化 ----
  const chgState = {p: (DATA.periods.find(p=>p.available) || DATA.periods[0] || {key:'d'}).key, unit:'lots'};

  const cFmt  = v => chgState.unit==='val' ? (v<0?'-':'')+Math.abs(v).toFixed(2)+' 億' : fmt(v);
  const cHead = () => chgState.unit==='val' ? '金額(億)' : '張數變化';
  const cAxis = () => chgState.unit==='val' ? '億元' : '張';
  function buildChange(){
    const area = document.getElementById('chgArea');
    let tabs='<div class="tabs"><span class="lab">期間</span>';
    DATA.periods.forEach(p=>{

    });
    tabs+='</div>';
    if (DATA.has_value){
      tabs+='<div class="tabs" style="margin-top:8px"><span class="lab">單位</span>'+

    }
    tabs+='<div id="chgBody"></div>';
    area.innerHTML = tabs;

    rows.forEach(r=>{ h+=`<tr><td class="rank">${r.rank}</td>

  }
  function cBar(id,rows,color){
    const r=rows.slice().reverse();

  function renderChange(){
    const p = DATA.periods.find(x=>x.key===chgState.p) || DATA.periods[0];

        `免費資料無歷史可回補，每交易日 18:00 自動累積一天。</div>`;
      return;
    }
    const cc = DATA.changes[p.key];
    const node = (chgState.unit==='val' && cc.val) ? cc.val : cc.lots;
    body.innerHTML='<div class="panels">'+

      '</div>';
    cBar('addChart',node.add,'#16a34a'); cBar('redChart',node.reduce,'#dc2626');
    cTable('addTable',node.add); cTable('redTable',node.reduce);
  }

  // ---- 單一 ETF 持股分配 ----
  const PE = DATA.per_etf || {};
  function buildSingle(){
    const sel = document.getElementById('etfSelect');

  }
  function renderSingle(code){
    const rows = PE[code] || [];
    const meta = DATA.etfs.find(e=>e.code===code) || {};
    const wsum = rows.reduce((a,b)=>a+b.weight,0);
    document.getElementById('singleMeta').textContent =
      `${meta.name||code}（${code}）· 持股 ${rows.length} 檔 · 權重合計 ${wsum.toFixed(1)}% · 資料日 ${meta.date||DATA.as_of}`;
    const r = rows.slice(0,20).reverse();
    Plotly.newPlot('singleChart',[{type:'bar',orientation:'h',
      x:r.map(x=>x.weight), y:r.map(x=>x.name+' '+x.symbol),
      text:r.map(x=>x.weight+'%'), textposition:'auto', marker:{color:'#7c3aed'},
      hovertemplate:'%{y}<br>權重 %{x}%<extra></extra>'}],
      {margin:{l:135,r:16,t:6,b:30},height:Math.max(300, r.length*16+60),
       xaxis:{title:'權重(%)',gridcolor:'#eef2f7'},yaxis:{automargin:true,tickfont:{size:11}},
       paper_bgcolor:'rgba(0,0,0,0)',plot_bgcolor:'rgba(0,0,0,0)'},
      {responsive:true,displayModeBar:false});
    let h='<thead><tr><th>#</th><th class="l">代號</th><th class="l">名稱</th><th>權重%</th><th>張數</th></tr></thead><tbody>';
    rows.forEach((x,i)=>{ h+=`<tr><td class="rank">${i+1}</td>
      <td class="l"><a href="${yh(x.symbol)}" target="_blank" rel="noopener">${x.symbol}</a></td>
      <td class="l">${x.name}</td>
      <td class="num" style="color:#7c3aed">${x.weight.toFixed(2)}</td>
      <td class="num">${fmt(x.lots)}</td></tr>`;});
    document.getElementById('singleTable').innerHTML=h+'</tbody>';
  }

  buildHoldings(); buildSingle(); buildChange();
})();
</script>

</body>
</html>
